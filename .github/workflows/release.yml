name: Release plugin bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate plugin structure
        run: python3 scripts/validate_plugin.py

      - name: Build plugin bundle
        run: |
          mkdir -p dist
          rm -f dist/producer.plugin
          cd plugins/producer
          zip -rq ../../dist/producer.plugin . -x "*.DS_Store"
          cd ../..
          ls -la dist/

      - name: Verify bundle contents
        run: |
          unzip -l dist/producer.plugin | head -20
          unzip -p dist/producer.plugin .claude-plugin/plugin.json | python3 -m json.tool

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: Producer ${{ steps.tag.outputs.ref }}
          generate_release_notes: true
          files: dist/producer.plugin
